<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נטלינק | אינדקס אתרים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* צבעים בהירים - מודרניים ורכים */
    --bg: #F8F9FA;
    --surface: #FFFFFF;
    --surface-2: #F1F3F5;
    --text: #1F2937;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --accent: #4F46E5;
    --accent-2: #7C3AED;
    --accent-soft: #EEF2FF;
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
    --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    --shadow-hover: 0 20px 40px -10px rgba(79, 70, 229, 0.15);
    --shadow-strong: rgba(79, 70, 229, 0.25);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    color-scheme: light;
  }
  
  html.dark {
    /* צבעים כהים - עמוקים ואלגנטיים */
    --bg: #0B0F19;
    --surface: #111827;
    --surface-2: #1F2937;
    --text: #F9FAFB;
    --text-muted: #9CA3AF;
    --border: #374151;
    --accent: #6366F1;
    --accent-2: #8B5CF6;
    --accent-soft: rgba(99, 102, 241, 0.15);
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
    --shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    --shadow-hover: 0 20px 40px -10px rgba(99, 102, 241, 0.2);
    --shadow-strong: rgba(99, 102, 241, 0.4);
    color-scheme: dark;
  }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Assistant', system-ui, sans-serif;
    transition: background 0.3s ease, color 0.3s ease;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* ---------- Header ---------- */
  header {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--surface) 80%, transparent);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-badge {
    width: 38px; height: 38px; border-radius: var(--radius-sm); flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px var(--shadow-strong);
  }
  .brand-badge svg { width: 20px; height: 20px; color: #fff; }
  .brand-word { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .brand-word span {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  
  .header-controls { display: flex; align-items: center; gap: 12px; flex: 1; max-width: 540px; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input {
    width: 100%; padding: 12px 46px 12px 20px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
    font-size: 15px; font-weight: 500; outline: none;
    transition: all 0.2s ease;
  }
  .search-wrap input:focus {
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap svg {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
    transition: color 0.2s ease;
  }
  .search-wrap input:focus + svg { color: var(--accent); }
  
  .theme-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); 
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .theme-btn svg { width: 20px; height: 20px; }
  .theme-btn .moon { display: none; }
  html.dark .theme-btn .sun { display: none; }
  html.dark .theme-btn .moon { display: block; }

  .suggest-btn {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    padding: 0 20px; height: 44px; border-radius: 100px; border: none;
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 15px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border);
    transition: all 0.2s ease;
  }
  html.dark .suggest-btn { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .suggest-btn:hover { 
    border-color: var(--accent); color: var(--accent); 
    transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow-strong);
  }
  .suggest-btn span { white-space: nowrap; }

  /* ---------- Category chips ---------- */
  .chip-nav-wrap {
    position: sticky; top: 71px; z-index: 40;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .chip-nav-scroller {
    max-width: 1200px; margin: 0 auto; position: relative; display: flex; align-items: center;
  }
  .chip-nav {
    padding: 16px 24px; display: flex; gap: 10px; overflow-x: auto; 
    scrollbar-width: none; scroll-behavior: smooth; flex: 1;
  }
  .chip-nav::-webkit-scrollbar { display: none; }
  .chip-arrow {
    position: absolute; top: 0; bottom: 0; z-index: 5; width: 44px; flex-shrink: 0;
    display: none; align-items: center; justify-content: center; border: none; cursor: pointer;
    color: var(--text-muted); transition: color 0.2s ease;
  }
  .chip-arrow.show { display: flex; }
  .chip-arrow:disabled { opacity: 0; pointer-events: none; }
  .chip-arrow svg { width: 20px; height: 20px; }
  .chip-arrow:hover { color: var(--accent); }
  .chip-arrow-start { inset-inline-start: 0; background: linear-gradient(to left, transparent, var(--bg) 60%); }
  .chip-arrow-end { inset-inline-end: 0; background: linear-gradient(to right, transparent, var(--bg) 60%); }
  
  .chip {
    flex-shrink: 0; padding: 8px 20px; border-radius: 100px; font-size: 14.5px; font-weight: 600;
    background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
  }
  .chip:hover { color: var(--text); border-color: var(--text-muted); }
  .chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 12px var(--shadow-strong);
  }

  /* ---------- Main ---------- */
  main { max-width: 1200px; margin: 0 auto; padding: 12px 24px 80px; }
  .category-section { scroll-margin-top: 150px; }
  .category-heading { display: flex; align-items: center; gap: 14px; margin: 48px 0 24px; }
  .category-heading .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-2); flex-shrink: 0; box-shadow: 0 0 8px currentColor; }
  .category-heading h2 { font-size: 20px; font-weight: 800; margin: 0; white-space: nowrap; color: var(--text); }
  .category-heading .line { flex: 1; height: 1px; background: linear-gradient(to left, var(--border), transparent); }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 20px; display: flex; flex-direction: column; gap: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease;
    opacity: 0; transform: translateY(15px); animation: riseIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--accent);
    box-shadow: var(--shadow-hover);
  }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  
  .card-top { display: flex; align-items: center; gap: 14px; }
  .card-logo {
    width: 48px; height: 48px; border-radius: var(--radius-sm); object-fit: contain;
    background: #fff; flex-shrink: 0; border: 1px solid var(--border); padding: 2px;
  }
  html.dark .card-logo { background: var(--surface-2); }
  .card-logo-fallback {
    width: 48px; height: 48px; border-radius: var(--radius-sm); flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-soft), var(--surface-2)); 
    color: var(--accent); display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 20px; border: 1px solid var(--border);
  }
  .card-name { font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--text); }
  .card-desc {
    font-size: 14px; color: var(--text-muted); line-height: 1.6; margin: 0;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

  /* ---------- Modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .modal-overlay.open { display: flex; opacity: 1; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 32px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    transform: scale(0.95) translateY(20px); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .modal-header h2 { font-size: 22px; font-weight: 800; margin: 0; color: var(--text); }
  .modal-close {
    width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--surface-2);
    color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
  }
  .modal-close:hover { background: #FEE2E2; color: #EF4444; transform: rotate(90deg); }
  html.dark .modal-close:hover { background: rgba(239, 68, 68, 0.2); }
  .modal-lead { font-size: 14.5px; color: var(--text-muted); margin: 0 0 24px; line-height: 1.5; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .field .req { color: #EF4444; }
  .field .hint { font-size: 12.5px; color: var(--text-muted); font-weight: 400; margin-right: 4px; }
  .field input, .field textarea {
    width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: inherit; font-size: 15px; outline: none;
    transition: all 0.2s ease;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); background: var(--surface);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; gap: 0; } }

  .submit-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 14px var(--shadow-strong);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow-strong); }
  .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
  .submit-btn .spinner {
    width: 18px; height: 18px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
    animation: spin 0.8s linear infinite; display: none;
  }
  .submit-btn.loading .spinner { display: inline-block; }
  .submit-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .banner {
    margin-top: 16px; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14.5px; font-weight: 600;
    display: none; align-items: center; gap: 10px; animation: modalIn 0.3s ease;
  }
  .banner.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #059669; }
  html.dark .banner.success { color: #34D399; }
  .banner.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #DC2626; }
  html.dark .banner.error { color: #F87171; }

  /* ---------- States ---------- */
  .state-box { text-align: center; padding: 100px 20px; color: var(--text-muted); }
  .state-box h3 { color: var(--text); font-size: 22px; font-weight: 800; margin: 0 0 12px; }
  .state-box p { margin: 0; font-size: 16px; line-height: 1.5; }
  .retry-btn {
    margin-top: 24px; padding: 12px 28px; border-radius: 100px; border: none;
    background: var(--text); color: var(--bg); cursor: pointer; font-size: 15px; font-weight: 700;
    transition: transform 0.2s ease;
  }
  .retry-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

  .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 16px; }
  .skeleton-card {
    height: 120px; border-radius: var(--radius-md); 
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border: 1px solid var(--border);
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; transform: none !important; }
    .card { opacity: 1; }
  }

  @media (max-width: 640px) {
    .header-inner { flex-wrap: wrap; padding: 16px; gap: 16px; }
    .brand-word { font-size: 22px; }
    .header-controls { order: 3; max-width: 100%; width: 100%; }
    .suggest-btn span { display: none; }
    .suggest-btn { padding: 0; width: 44px; justify-content: center; border-radius: 50%; }
    .chip-nav-wrap { top: 125px; }
    main { padding: 12px 16px 80px; }
    .grid { grid-template-columns: 1fr; gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 7h3a5 5 0 0 1 0 10h-3"/>
          <path d="M9 17H6a5 5 0 0 1 0-10h3"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </div>
      <div class="brand-word">נט<span>לינק</span></div>
    </div>
    <div class="header-controls">
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="חיפוש אתר...">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <button class="suggest-btn" id="suggestBtn" title="הציעו אתר">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>הציעו אתר</span>
      </button>
      <button class="theme-btn" id="themeBtn" aria-label="החלף מצב תצוגה">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"></circle><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"></path></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"></path></svg>
      </button>
    </div>
  </div>
  <div class="chip-nav-wrap">
    <div class="chip-nav-scroller">
      <button class="chip-arrow chip-arrow-start" id="chipArrowStart" aria-label="גלול לצד ההתחלה">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 18 17 12 11 6"></polyline></svg>
      </button>
      <nav class="chip-nav" id="chipNav"></nav>
      <button class="chip-arrow chip-arrow-end" id="chipArrowEnd" aria-label="גלול לצד הסוף">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 18 7 12 13 6"></polyline></svg>
      </button>
    </div>
  </div>
</header>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h2 id="modalTitle">הציעו אתר לנטלינק</h2>
      <button class="modal-close" id="modalClose" aria-label="סגור">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="modal-lead">ההצעה נשלחת לבדיקה ותתווסף לדף לאחר אישור המערכת.</p>
    <form id="suggestForm">
      <div class="field">
        <label for="s-name">שם האתר <span class="req">*</span></label>
        <input id="s-name" type="text" required placeholder="לדוגמה: ויקיפדיה">
      </div>
      <div class="field">
        <label for="s-url">קישור לאתר <span class="req">*</span></label>
        <input id="s-url" type="url" required placeholder="https://example.com">
      </div>
      <div class="field">
        <label for="s-desc">תיאור <span class="hint">(רשות)</span></label>
        <textarea id="s-desc" maxlength="140" placeholder="ספרו בקצרה על האתר..."></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label for="s-logo">קישור ללוגו <span class="hint">(רשות)</span></label>
          <input id="s-logo" type="url" placeholder="https://.../logo.png">
        </div>
        <div class="field">
          <label for="s-cat">קטגוריה <span class="hint">(רשות)</span></label>
          <input id="s-cat" type="text" placeholder="לדוגמה: חדשות, כלים">
        </div>
      </div>
      <button type="submit" class="submit-btn" id="suggestSubmitBtn">
        <span class="btn-text">שליחת ההצעה</span>
        <span class="spinner"></span>
      </button>
      <div class="banner success" id="suggestSuccess">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        ההצעה נשלחה בהצלחה, תודה!
      </div>
      <div class="banner error" id="suggestError">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        השליחה נכשלה, אנא נסו שוב.
      </div>
    </form>
  </div>
</div>

<main id="main">
  <div class="skeleton-grid" id="skeleton">
    <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
    <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
  </div>
</main>

<script>
  // ===== קישור ה-CSV של הגיליון (טור: קישור, שם האתר, תיאור, לוגו, קטגוריה) =====
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqW9PU8W3ao33tsiYdwLCKxoENM1zJJsR4LfNrZp1gjLuuuUDH6m13XiVev9LDg8XkpgBwL_ITPkc-/pub?gid=0&single=true&output=csv";
  // ===== Apps Script של הגיליון השיתופי - להצעות אתרים מהמשתמשים =====
  const SUGGEST_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx6CgLnK2WO983z366MzKHThSxwG6rLkaN_Seim9loWPIFHAn1Norxx924ukMCx2ykqWw/exec";

  const mainEl = document.getElementById('main');
  const chipNav = document.getElementById('chipNav');
  const chipArrowStart = document.getElementById('chipArrowStart');
  const chipArrowEnd = document.getElementById('chipArrowEnd');

  // ---------- Chip nav horizontal scroll (RTL-safe) ----------
  function detectRtlScrollType(){
    const el = document.createElement('div');
    el.dir = 'rtl';
    el.style.cssText = 'position:absolute;top:-9999px;width:4px;height:1px;overflow:scroll;font-size:14px;';
    const inner = document.createElement('div');
    inner.style.width = '8px';
    el.appendChild(inner);
    document.body.appendChild(el);
    let type = 'default';
    if(el.scrollLeft > 0){
      type = 'default';
    } else {
      el.scrollLeft = 1;
      type = (el.scrollLeft === 0) ? 'negative' : 'reverse';
    }
    el.remove();
    return type;
  }
  const rtlScrollType = detectRtlScrollType();

  function scrollFraction(){
    const max = chipNav.scrollWidth - chipNav.clientWidth;
    if(max <= 0) return 0;
    const sl = chipNav.scrollLeft;
    if(rtlScrollType === 'negative') return (-sl) / max;
    if(rtlScrollType === 'reverse') return (max - sl) / max;
    return sl / max;
  }
  function scrollChips(forward){
    const amount = 240;
    const delta = (rtlScrollType === 'default') ? amount : -amount;
    chipNav.scrollBy({ left: forward ? delta : -delta, behavior: 'smooth' });
  }
  function updateChipArrows(){
    const max = chipNav.scrollWidth - chipNav.clientWidth;
    const overflow = max > 4;
    chipArrowStart.classList.toggle('show', overflow);
    chipArrowEnd.classList.toggle('show', overflow);
    if(!overflow) return;
    const frac = scrollFraction();
    chipArrowStart.disabled = frac <= 0.02;
    chipArrowEnd.disabled = frac >= 0.98;
  }
  chipArrowStart.addEventListener('click', () => scrollChips(false));
  chipArrowEnd.addEventListener('click', () => scrollChips(true));
  chipNav.addEventListener('scroll', updateChipArrows, { passive: true });
  window.addEventListener('resize', updateChipArrows);

  // ---------- Category colors ----------
  const CATEGORY_PALETTE = ['#4F46E5','#059669','#D97706','#DC2626','#DB2777','#7C3AED','#0891B2','#65A30D','#EA580C','#2563EB','#C026D3','#16A34A'];
  function categoryColor(name){
    let hash = 0;
    for(let i=0;i<name.length;i++){ hash = (hash * 31 + name.charCodeAt(i)) >>> 0; }
    return CATEGORY_PALETTE[hash % CATEGORY_PALETTE.length];
  }

  // ---------- Theme ----------
  const themeBtn = document.getElementById('themeBtn');
  let isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme();
  themeBtn.addEventListener('click', () => { isDark = !isDark; applyTheme(); });
  function applyTheme(){ document.documentElement.classList.toggle('dark', isDark); }

  // ---------- CSV Parser ----------
  function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i=0;i<text.length;i++){
      const c = text[i], next = text[i+1];
      if(inQuotes){
        if(c === '"' && next === '"'){ field += '"'; i++; }
        else if(c === '"'){ inQuotes = false; }
        else { field += c; }
      } else {
        if(c === '"'){ inQuotes = true; }
        else if(c === ','){ row.push(field); field=''; }
        else if(c === '\r'){ /* skip */ }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else { field += c; }
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    if(!rows.length) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1)
      .filter(r => r.some(v => v.trim() !== ''))
      .map(r => {
        const obj = {};
        headers.forEach((h,i) => obj[h] = (r[i] || '').trim());
        return obj;
      });
  }

  function norm(obj, keys){
    for(const k of keys){ if(obj[k]) return obj[k]; }
    return '';
  }

  // ---------- Fetch & Render ----------
  let allSites = [];

  async function load(){
    try{
      const res = await fetch(SHEET_CSV_URL);
      if(!res.ok) throw new Error('bad status');
      const text = await res.text();
      const rows = parseCSV(text);
      allSites = rows.map(r => ({
        url: norm(r, ['קישור','URL','קישור לאתר']),
        name: norm(r, ['שם האתר','שם']),
        desc: norm(r, ['תיאור']),
        logo: norm(r, ['לוגו','קישור ללוגו']),
        category: norm(r, ['קטגוריה']) || 'כללי'
      })).filter(s => s.url && s.name);
      render(allSites);
    }catch(err){
      renderError();
    }
  }

  function renderError(){
    mainEl.innerHTML = `
      <div class="state-box">
        <h3>לא הצלחנו לטעון את רשימת האתרים</h3>
        <p>ודאו שהגיליון מקושר כראוי לרשת, ונסו שוב.</p>
        <button class="retry-btn" onclick="load()">נסה שוב</button>
      </div>`;
    chipNav.innerHTML = '';
    chipArrowStart.classList.remove('show');
    chipArrowEnd.classList.remove('show');
  }

  function render(sites){
    if(!sites.length){
      mainEl.innerHTML = `
        <div class="state-box">
          <h3>עדיין לא נוספו אתרים</h3>
          <p>הוסיפו שורה בגיליון עם קישור, שם, תיאור, לוגו וקטגוריה — והדף יתעדכן.</p>
        </div>`;
      chipNav.innerHTML = '';
      chipArrowStart.classList.remove('show');
      chipArrowEnd.classList.remove('show');
      return;
    }

    const categories = [...new Set(sites.map(s => s.category))].sort((a,b) => a.localeCompare(b,'he'));

    chipNav.innerHTML = `<button class="chip active" data-cat="all">הכל</button>` +
      categories.map(c => `<button class="chip" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');

    mainEl.innerHTML = categories.map(cat => {
      const catSites = sites.filter(s => s.category === cat);
      return `
        <section class="category-section" id="cat-${slug(cat)}">
          <div class="category-heading"><span class="dot" style="background:${categoryColor(cat)}"></span><h2>${escapeHtml(cat)}</h2><span class="line"></span></div>
          <div class="grid">
            ${catSites.map(cardHtml).join('')}
          </div>
        </section>`;
    }).join('');

    // Chip click -> scroll
    chipNav.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const cat = chip.dataset.cat;
        chipNav.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        if(cat === 'all'){ window.scrollTo({top:0, behavior:'smooth'}); return; }
        const target = document.getElementById('cat-' + slug(cat));
        if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
      });
    });

    setupScrollSpy(categories);
    updateChipArrows();
  }

  function cardHtml(s){
    const initials = escapeHtml((s.name || '?').trim().charAt(0));
    return `
      <a class="card" href="${escapeAttr(s.url)}" target="_blank" rel="noopener noreferrer">
        <div class="card-top">
          ${s.logo
            ? `<img class="card-logo" src="${escapeAttr(s.logo)}" alt="" loading="lazy"
                 onerror="this.outerHTML='<div class=&quot;card-logo-fallback&quot;>${initials}</div>'">`
            : `<div class="card-logo-fallback">${initials}</div>`}
          <div class="card-name">${escapeHtml(s.name)}</div>
        </div>
        ${s.desc ? `<p class="card-desc">${escapeHtml(s.desc)}</p>` : ''}
      </a>`;
  }

  function setupScrollSpy(categories){
    const sections = categories.map(c => document.getElementById('cat-' + slug(c))).filter(Boolean);
    if(!('IntersectionObserver' in window) || !sections.length) return;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          const id = entry.target.id;
          chipNav.querySelectorAll('.chip').forEach(c => {
            c.classList.toggle('active', 'cat-' + slug(c.dataset.cat) === id);
          });
        }
      });
    }, { rootMargin: '-150px 0px -70% 0px' });
    sections.forEach(s => observer.observe(s));
  }

  // ---------- Search ----------
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if(!q){ render(allSites); return; }
    const filtered = allSites.filter(s =>
      s.name.toLowerCase().includes(q) || (s.desc && s.desc.toLowerCase().includes(q))
    );
    render(filtered);
  });

  function slug(str){ return str.replace(/[^\p{L}\p{N}]+/gu, '-'); }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  // ---------- Suggest a site modal ----------
  const modalOverlay = document.getElementById('modalOverlay');
  const suggestBtn = document.getElementById('suggestBtn');
  const modalClose = document.getElementById('modalClose');
  const suggestForm = document.getElementById('suggestForm');
  const suggestSubmitBtn = document.getElementById('suggestSubmitBtn');
  const suggestSuccess = document.getElementById('suggestSuccess');
  const suggestError = document.getElementById('suggestError');

  function openModal(){ 
    modalOverlay.style.display = 'flex';
    // Timeout needed to allow display:flex to apply before adding the open class for the transition
    setTimeout(() => modalOverlay.classList.add('open'), 10);
    document.body.style.overflow = 'hidden'; 
  }
  function closeModal(){ 
    modalOverlay.classList.remove('open'); 
    setTimeout(() => modalOverlay.style.display = 'none', 300); // Wait for transition
    document.body.style.overflow = ''; 
  }

  suggestBtn.addEventListener('click', openModal);
  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal(); });

  suggestForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    suggestSuccess.style.display = 'none';
    suggestError.style.display = 'none';

    const payload = {
      name: document.getElementById('s-name').value.trim(),
      url: document.getElementById('s-url').value.trim(),
      desc: document.getElementById('s-desc').value.trim(),
      logo: document.getElementById('s-logo').value.trim(),
      category: document.getElementById('s-cat').value.trim()
    };
    if(!payload.name || !payload.url){ return; }

    suggestSubmitBtn.classList.add('loading');
    suggestSubmitBtn.disabled = true;
    try{
      await fetch(SUGGEST_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      suggestSuccess.style.display = 'flex';
      suggestForm.reset();
      setTimeout(closeModal, 2000);
    }catch(err){
      suggestError.style.display = 'flex';
    }finally{
      suggestSubmitBtn.classList.remove('loading');
      suggestSubmitBtn.disabled = false;
    }
  });

  load();
</script>
</body>
</html>
